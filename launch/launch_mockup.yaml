%YAML 1.2
---
launch:
  - arg:
      name: "ns"
      default: "bdd"
  - arg:
      name: "config"
      default: "$(find-pkg-share bdd_exec_ros2)/config/mockup_configs.yaml"
  - node:
      pkg: "bdd_exec_ros2"
      exec: "bdd_coordination_node"
      namespace: "$(var ns)"
      name: "test_coordinator"
      param:
        - from: "$(var config)"
  - node:
      pkg: "bdd_exec_ros2"
      exec: "mockup_behaviour_node"
      namespace: "$(var ns)"
      name: "mockup_behaviour"
      param:
        - from: "$(var config)"
